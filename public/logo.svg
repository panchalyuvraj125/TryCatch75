<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Minimalist dark background -->
  <rect width="100" height="100" rx="24" fill="#0a0a0f" />
  
  <g stroke="#00f5ff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Glowing shadow layer -->
    <g filter="drop-shadow(0px 0px 6px rgba(0, 245, 255, 0.6))">
      <!-- The inner checkmark -->
      <path d="M 32 52 L 46 66 L 76 26" stroke-width="10" />
      
      <!-- The continuous brace frame -->
      <path d="M 58 20 
               L 35 20 
               C 25 20, 20 25, 20 35 
               L 20 42 
               C 20 46, 16 48, 10 50 
               C 16 52, 20 54, 20 58 
               L 20 65 
               C 20 75, 25 80, 35 80 
               L 65 80 
               C 75 80, 80 75, 80 65 
               L 80 58 
               C 80 54, 84 52, 90 50 
               C 84 48, 80 46, 80 42 
               L 80 36" 
            stroke-width="8" />
    </g>
  </g>
</svg>
